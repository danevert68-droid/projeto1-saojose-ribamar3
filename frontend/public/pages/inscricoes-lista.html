<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Minhas Inscrições</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Poppins', system-ui, -apple-system, sans-serif;
      background: #f3f4f6;
      color: #111827;
      min-height: 100vh;
    }
    .topbar {
      background: #ffffff;
      border-bottom: 1px solid #e5e7eb;
      padding: 14px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    .topbar-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #1e3a8a;
      text-decoration: none;
    }
    .topbar-brand img {
      width: 56px;
      height: 56px;
      object-fit: contain;
      display: block;
    }
    .topbar-brand-text {
      display: flex;
      flex-direction: column;
      line-height: 1.15;
      font-size: 11px;
      font-weight: 500;
      color: #1f2937;
    }
    .topbar-brand-text strong {
      font-weight: 600;
      color: #1e3a8a;
    }
    .topbar-nav {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .topbar-nav a {
      text-decoration: none;
      color: #4b5563;
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      transition: background .15s, color .15s;
    }
    .topbar-nav a:hover { background: #f3f4f6; color: #1e3a8a; }
    .topbar-nav a.active { background: #eef2ff; color: #1e3a8a; }
    .btn-logout {
      background: transparent;
      border: 1px solid #e5e7eb;
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      color: #6b7280;
      font-family: inherit;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn-logout:hover { background: #fef2f2; color: #b91c1c; border-color: #fecaca; }
    .topbar-user {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #1f2937;
      padding: 6px 12px;
      border-radius: 999px;
      background: #eef2ff;
      max-width: 220px;
    }
    .topbar-user .icon-user {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #c7d2fe;
      color: #1e3a8a;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
      flex-shrink: 0;
    }
    .topbar-user .email {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 170px;
    }
    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .icon-bell {
      color: #6b7280;
      width: 20px;
      height: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 36px 28px;
    }
    .page-head {
      margin-bottom: 28px;
    }
    .page-head h1 {
      font-size: 26px;
      margin: 0 0 6px;
      color: #111827;
      font-weight: 600;
    }
    .page-head p {
      margin: 0;
      color: #6b7280;
      font-size: 14px;
    }
    .actions-row {
      display: flex;
      gap: 10px;
      margin: 18px 0 24px;
      flex-wrap: wrap;
    }
    .btn-primary {
      background: #1e3a8a;
      color: #fff;
      border: none;
      padding: 10px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      transition: background .15s;
    }
    .btn-primary:hover { background: #1e40af; }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 18px;
    }
    .card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      transition: box-shadow .15s, transform .15s;
    }
    .card:hover {
      box-shadow: 0 8px 24px rgba(30, 58, 138, 0.08);
      transform: translateY(-2px);
    }
    .card-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
    }
    .card-title {
      font-size: 15px;
      font-weight: 600;
      color: #111827;
      line-height: 1.35;
    }
    .badge {
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      white-space: nowrap;
      letter-spacing: 0.02em;
    }
    .badge.pendente {
      background: #fff7ed;
      color: #c2410c;
      border: 1px solid #fed7aa;
    }
    .badge.pago {
      background: #ecfdf5;
      color: #047857;
      border: 1px solid #a7f3d0;
    }
    .badge.cancelado {
      background: #fef2f2;
      color: #b91c1c;
      border: 1px solid #fecaca;
    }
    .card-info { font-size: 13px; color: #4b5563; line-height: 1.5; }
    .card-info strong { color: #111827; font-weight: 600; }
    .card-info-row { display: flex; justify-content: space-between; padding: 4px 0; }
    .card-info-row .label { color: #6b7280; }
    .card-foot {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-top: 4px;
      padding-top: 14px;
      border-top: 1px solid #f3f4f6;
    }
    .card-foot .valor {
      font-size: 17px;
      font-weight: 600;
      color: #1e3a8a;
    }
    .btn-ver {
      background: #1e3a8a;
      color: #fff;
      border: none;
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      transition: background .15s;
    }
    .btn-ver:hover { background: #1e40af; }

    .empty {
      text-align: center;
      padding: 80px 20px;
      color: #6b7280;
      background: #fff;
      border-radius: 12px;
      border: 1px solid #e5e7eb;
    }
    .empty h2 { margin: 0 0 8px; font-size: 18px; color: #111827; }
    .empty p { margin: 0 0 18px; font-size: 14px; }

    .loading {
      text-align: center;
      padding: 60px 20px;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <header class="topbar" data-testid="inscricoes-topbar">
    <a href="/home" class="topbar-brand" data-nav>
      <img src="/logo-jkma.webp" alt="Instituto Social da Cidadania Juscelino Kubitschek" />
      <div class="topbar-brand-text">
        <strong>Instituto Social</strong>
        <span>da Cidadania</span>
        <span>Juscelino Kubitschek</span>
      </div>
    </a>
    <nav class="topbar-nav">
      <a href="/home" data-nav data-testid="nav-inicio">Início</a>
      <a href="/inscricoes" class="active" data-nav data-testid="nav-inscricoes">Inscrições</a>
      <a href="/inscricao" data-nav data-testid="nav-concursos">Concursos abertos</a>
    </nav>
    <div class="topbar-actions">
      <button class="icon-bell-btn" aria-label="Notificações" data-testid="topbar-bell" type="button" style="background:transparent;border:none;padding:4px;cursor:pointer;color:#64748b;display:inline-flex;align-items:center;">
        <svg class="icon-bell" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
        </svg>
      </button>
      <span class="topbar-user-inline" id="topbar-user-inline" data-testid="topbar-user" style="display:none;color:#0f172a;font-size:14px;align-items:center;gap:10px;max-width:260px;">
        <span style="color:#6366f1;display:inline-flex;flex-shrink:0;">
          <svg width="22" height="22" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
          </svg>
        </span>
        <span id="user-email" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px;font-weight:500;">—</span>
      </span>
      <button type="button" data-testid="btn-logout" id="btn-logout" style="display:inline-flex;align-items:center;gap:8px;padding:4px 6px;background:transparent;border:none;cursor:pointer;font-family:inherit;font-size:14px;font-weight:500;color:#475569;">
        <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.36 6.64a9 9 0 11-12.73 0M12 2v10"/>
        </svg>
        <span>Sair</span>
      </button>
    </div>
  </header>

  <main class="container">
    <div class="page-head">
      <h1>Minhas Inscrições</h1>
      <p>Acompanhe o status de todas as suas inscrições e finalize os pagamentos pendentes.</p>
    </div>
    <div class="actions-row">
      <button class="btn-primary" id="btn-nova" data-testid="btn-nova-inscricao">+ Nova inscrição</button>
    </div>
    <div id="content">
      <div class="loading">Carregando suas inscrições…</div>
    </div>
  </main>

  <script>
  (function () {
    function getToken() {
      try { return window.top.localStorage.getItem('candidate_token'); }
      catch (e) { return localStorage.getItem('candidate_token'); }
    }
    function navigateTop(path) {
      try { window.top.location.href = path; }
      catch (e) { window.location.href = path; }
    }
    function origin() {
      try { return window.top.location.origin; }
      catch (e) { return window.location.origin; }
    }
    function fmtMoney(n) {
      var v = parseFloat(n || 0).toFixed(2).replace('.', ',');
      return 'R$ ' + v;
    }
    function fmtDate(iso) {
      if (!iso) return '';
      try {
        var d = new Date(iso);
        var pad = function (x) { return String(x).padStart(2, '0'); };
        return pad(d.getDate()) + '/' + pad(d.getMonth() + 1) + '/' + d.getFullYear() +
               ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
      } catch (e) { return iso; }
    }
    function statusBadge(status) {
      var s = String(status || '').toLowerCase();
      if (s.indexOf('pag') === 0 && s.indexOf('aguard') !== 0) {
        return '<span class="badge pago" data-testid="badge-pago">Pago</span>';
      }
      if (s.indexOf('cancel') === 0) {
        return '<span class="badge cancelado">Cancelado</span>';
      }
      return '<span class="badge pendente" data-testid="badge-pendente">Pendente de pagamento</span>';
    }
    function valorFromCargo(cargo) {
      var c = String(cargo || '');
      if (/superior|prof\.?|professor|licenciatura|bacharel|nível superior/i.test(c)) return 145;
      if (/m[eé]dio|t[eé]cnico|nível m[eé]dio/i.test(c)) return 115;
      if (/fundamental|nível fundamental/i.test(c)) return 81;
      return 115;
    }
    function cardHtml(insc) {
      var valor = valorFromCargo(insc.cargo);
      return (
        '<div class="card" data-testid="card-inscricao-' + (insc.id || '').slice(0, 8) + '">' +
          '<div class="card-head">' +
            '<div class="card-title">' + (insc.concurso || 'Concurso') + '</div>' +
            statusBadge(insc.status) +
          '</div>' +
          '<div class="card-info">' +
            '<div class="card-info-row"><span class="label">Cargo</span><strong>' + (insc.cargo || '—') + '</strong></div>' +
            '<div class="card-info-row"><span class="label">Cota</span><span>' + (insc.cota || 'Ampla concorrência') + '</span></div>' +
            '<div class="card-info-row"><span class="label">Inscrito em</span><span>' + fmtDate(insc.created_at) + '</span></div>' +
          '</div>' +
          '<div class="card-foot">' +
            '<div class="valor">' + fmtMoney(valor) + '</div>' +
            '<button class="btn-ver" data-id="' + insc.id + '" data-testid="btn-ver-inscricao">Ver detalhes</button>' +
          '</div>' +
        '</div>'
      );
    }
    async function load() {
      var token = getToken();
      if (!token) { navigateTop('/login'); return; }
      // Load user email for topbar
      try {
        var meResp = await fetch(origin() + '/api/auth/me', {
          headers: { 'Authorization': 'Bearer ' + token },
        });
        if (meResp.ok) {
          var meData = await meResp.json();
          var emailEl = document.getElementById('user-email');
          var userBox = document.getElementById('topbar-user-inline');
          if (emailEl && meData.email) {
            emailEl.textContent = meData.email;
            if (userBox) userBox.style.display = 'inline-flex';
          }
        }
      } catch (_) {}
      try {
        var resp = await fetch(origin() + '/api/inscricoes/minhas', {
          headers: { 'Authorization': 'Bearer ' + token },
        });
        if (resp.status === 401) { navigateTop('/login'); return; }
        var list = await resp.json();
        render(Array.isArray(list) ? list : []);
      } catch (e) {
        document.getElementById('content').innerHTML =
          '<div class="empty"><h2>Não foi possível carregar</h2><p>Tente novamente em instantes.</p></div>';
      }
    }
    function render(list) {
      var el = document.getElementById('content');
      if (!list.length) {
        el.innerHTML =
          '<div class="empty" data-testid="empty-state">' +
            '<h2>Nenhuma inscrição encontrada</h2>' +
            '<p>Escolha um concurso aberto para realizar sua primeira inscrição.</p>' +
            '<button class="btn-primary" id="btn-go-concursos">Ver concursos abertos</button>' +
          '</div>';
        var b = document.getElementById('btn-go-concursos');
        if (b) b.addEventListener('click', function () { navigateTop('/inscricao'); });
        return;
      }
      el.innerHTML = '<div class="cards" data-testid="cards-inscricoes">' + list.map(cardHtml).join('') + '</div>';
      el.querySelectorAll('.btn-ver').forEach(function (btn) {
        btn.addEventListener('click', function () {
          var id = btn.getAttribute('data-id');
          if (id) navigateTop('/inscricao/' + id);
        });
      });
    }
    function wireNav() {
      document.querySelectorAll('a[data-nav]').forEach(function (a) {
        a.addEventListener('click', function (e) {
          e.preventDefault();
          navigateTop(a.getAttribute('href'));
        });
      });
      var logout = document.getElementById('btn-logout');
      if (logout) {
        logout.addEventListener('click', function () {
          try { window.top.localStorage.removeItem('candidate_token'); } catch (_) {}
          navigateTop('/login');
        });
      }
      var nova = document.getElementById('btn-nova');
      if (nova) nova.addEventListener('click', function () { navigateTop('/inscricao'); });
    }
    wireNav();
    load();
  })();
  </script>
</body>
</html>
